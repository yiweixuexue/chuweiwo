name: Deploy production and dev to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  request-dev-preview:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Request deployment from main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main --repo "${GITHUB_REPOSITORY}"

  build-and-deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out production branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: production

      - name: Check out dev branch
        uses: actions/checkout@v6
        with:
          ref: dev
          path: development

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            production/package-lock.json
            development/package-lock.json

      - name: Install production dependencies
        working-directory: production
        run: npm ci

      - name: Build production site
        working-directory: production
        run: npm run build:github

      - name: Install dev dependencies
        working-directory: development
        run: npm ci

      - name: Build dev site
        working-directory: development
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /chuweiwo/dev
        run: npx next build

      - name: Add dev preview to the Pages artifact
        run: |
          mkdir -p production/out/dev
          cp -R development/out/. production/out/dev/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload combined site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./production/out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
